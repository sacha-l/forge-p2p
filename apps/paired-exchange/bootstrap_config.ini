; paired-exchange reference bootstrap config.
;
; The running binary configures BootstrapConfig programmatically (see
; src/main.rs); this file is provided only as a human-readable summary of
; the two-role port layout so anyone running the demo can find the ports.
;
; Role A:  TCP 53000, UDP 53001, UI http://127.0.0.1:8080
; Role B:  TCP 53100, UDP 53101, UI http://127.0.0.1:8081
;
; Discovery: both roles register with forge-ui's localhost backend (port
; range 8080..8089). Role B auto-dials role A on first sight.

[ports]
tcp=53000
udp=53001
