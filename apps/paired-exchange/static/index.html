<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>paired-exchange</title>
    <link rel="stylesheet" href="/app/app.css" />
  </head>
  <body>
    <header>
      <h1>paired-exchange</h1>
      <p id="subtitle">Loading...</p>
    </header>

    <section id="peers">
      <h2>Pairing status</h2>
      <div id="peer-list" class="empty">No peers yet. Waiting for a connection.</div>
    </section>

    <section id="rtt">
      <h2>Data plane</h2>
      <div id="rtt-summary" class="muted">Ping-pong will appear here once pairing completes.</div>
      <svg id="rtt-chart" viewBox="0 0 400 120" preserveAspectRatio="none" aria-hidden="true"></svg>
      <ul id="rtt-log"></ul>
    </section>

    <footer>
      <p class="muted">
        <strong>Gate:</strong> DataPing/DataPong only flow after mutual
        <em>Trusted</em>. Polls <code>/api/paired/state</code> once a second.
      </p>
    </footer>

    <script src="/app/app.js" defer></script>
  </body>
</html>
