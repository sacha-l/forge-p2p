<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>mesh-chat — dual view</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0f1117;
        --panel: #181a20;
        --border: #2a2d35;
        --fg: #e0e0e0;
        --muted: #9aa0a6;
        --accent: #6c9eff;
      }

      * { box-sizing: border-box; }

      html, body {
        height: 100%;
        margin: 0;
        background: var(--bg);
        color: var(--fg);
        font-family: "SF Mono", "Fira Code", "Consolas", monospace;
      }

      #dual-root {
        display: grid;
        grid-template-rows: auto 1fr;
        height: 100vh;
      }

      header {
        padding: 10px 16px;
        background: var(--panel);
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        gap: 12px;
      }

      header h1 {
        margin: 0;
        font-size: 14px;
        color: var(--accent);
      }

      header .hint {
        font-size: 11px;
        color: var(--muted);
      }

      header a {
        color: var(--muted);
        font-size: 11px;
        text-decoration: none;
        margin-left: auto;
        padding: 3px 8px;
        border: 1px solid var(--border);
        border-radius: 3px;
      }

      header a:hover { color: var(--accent); border-color: var(--accent); }

      #panels {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1px;
        background: var(--border);
        min-height: 0;
      }

      .panel {
        display: grid;
        grid-template-rows: auto 1fr;
        background: var(--panel);
        min-height: 0;
      }

      .panel-head {
        padding: 8px 14px;
        background: var(--panel);
        border-bottom: 1px solid var(--border);
        font-size: 12px;
        color: var(--muted);
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .panel-head .peer {
        color: var(--fg);
        font-weight: 600;
      }

      .panel-head .port {
        color: var(--accent);
      }

      .panel iframe {
        width: 100%;
        height: 100%;
        border: 0;
        background: var(--panel);
      }
    </style>
  </head>
  <body>
    <div id="dual-root">
      <header>
        <h1>mesh-chat — dual view</h1>
        <span class="hint">Both chats in one window. Peers + discovery live in each node's full UI (links on the right).</span>
        <a href="http://127.0.0.1:8080/" target="_blank">Al full UI ↗</a>
        <a href="http://127.0.0.1:8081/" target="_blank">Bobby full UI ↗</a>
      </header>

      <div id="panels">
        <div class="panel">
          <div class="panel-head">
            <span class="peer">Al</span>
            <span class="port">:8080</span>
          </div>
          <iframe src="http://127.0.0.1:8080/app/index.html" title="Al"></iframe>
        </div>
        <div class="panel">
          <div class="panel-head">
            <span class="peer">Bobby</span>
            <span class="port">:8081</span>
          </div>
          <iframe src="http://127.0.0.1:8081/app/index.html" title="Bobby"></iframe>
        </div>
      </div>
    </div>
  </body>
</html>
